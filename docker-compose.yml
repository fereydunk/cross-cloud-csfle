# Cross-Cloud CSFLE — Docker Compose
#
# Prerequisites:
#   1. Copy deployment/deployment.properties.template → deployment/deployment.properties and fill in values.
#   2. Set GOOGLE_APPLICATION_CREDENTIALS to a GCP service account JSON file with
#      roles/cloudkms.cryptoKeyDecrypterEncrypter on the GCP KMS key.
#      (For local dev: gcloud auth application-default login and point to ~/.config/gcloud/application_default_credentials.json)
#   3. Set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (and optionally AWS_SESSION_TOKEN).
#
# Normal run order:
#   docker compose run provisioner        # one-time DEK setup (dual mode: both KMS reachable)
#   docker compose run provision-dst      # split-mode phase 2 (run on destination side after schema linking replicates transfer subject)
#   docker compose run producer           # produce 10 CSFLE-encrypted records
#   docker compose run consumer           # decrypt from GCP mirror topic
#   docker compose run dek-sync           # pre-failback DEK sync (re-wrap GCP-era DEKs with AWS KMS)
#
# KMS boundary verification (see docs/test-cases.md for full spec and run results):
#   docker compose run source-consumer                  # TC-01: AWS cluster + AWS KMS → succeeds
#   docker compose run source-consumer-gcp-attempt      # TC-02: AWS cluster + GCP KMS → fails (expected)
#   docker compose run consumer                         # TC-03: GCP cluster + GCP KMS → succeeds
#   docker compose run destination-consumer-aws-attempt # TC-04: GCP cluster + AWS KMS → fails (expected)

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
  AWS_REGION: ${AWS_REGION:-us-east-2}

x-gcp-env: &gcp-env
  GOOGLE_APPLICATION_CREDENTIALS: /gcp-creds.json

x-volumes: &shared-vols
  - ./deployment/deployment.properties:/config/deployment.properties:ro
  - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/gcp-creds.json:ro

services:

  provisioner:
    build: .
    command: ["provision", "/config/deployment.properties"]
    environment:
      <<: [*aws-env, *gcp-env]
    volumes: *shared-vols

  producer:
    build: .
    command: ["producer", "/config/deployment.properties"]
    environment:
      <<: [*aws-env, *gcp-env]
    volumes: *shared-vols

  consumer:
    build: .
    command: ["consumer", "/config/deployment.properties"]
    environment:
      <<: *gcp-env
    volumes: *shared-vols

  source-consumer:
    build: .
    command: ["source-consumer", "/config/deployment.properties"]
    environment:
      <<: *aws-env
    volumes: *shared-vols

  source-consumer-gcp-attempt:
    build: .
    command: ["source-consumer-gcp-attempt", "/config/deployment.properties"]
    environment:
      <<: *gcp-env
    volumes: *shared-vols

  destination-consumer-aws-attempt:
    build: .
    command: ["destination-consumer-aws-attempt", "/config/deployment.properties"]
    environment:
      <<: *aws-env
    volumes: *shared-vols

  provision-dst:
    build: .
    command: ["provision-dst", "/config/deployment.properties"]
    environment:
      <<: *gcp-env
    volumes: *shared-vols

  dek-sync:
    build: .
    command: ["sync", "/config/deployment.properties"]
    environment:
      <<: [*aws-env, *gcp-env]
    volumes: *shared-vols
